name: claude-plasmids
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python>=3.9,<3.13
  - pip
  # pLannotate and its bioinformatics dependencies (conda-only)
  - plannotate
  # pip-installable packages
  - pip:
    - anthropic>=0.40.0
    - python-dotenv>=1.0.0
    - requests>=2.31.0
    - pytest>=8.0.0
    - biopython>=1.83
