name: claude-plasmids
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python>=3.9,<3.13
  - pip
  # pLannotate and its bioinformatics dependencies (conda-only)
  - plannotate
  # pip-installable packages — single source of truth is requirements.txt
  - pip:
    - -r requirements.txt
